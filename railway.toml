[build]
dockerfilePath = "bot/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# ── Multi-worker scaling ──────────────────────────────────────────────
#
# All shared env vars (DATABASE_URL, REDIS_URL, TELEGRAM_*, WORKER_COUNT,
# ARQ_MAX_JOBS, MAX_CONCURRENT_TRANSMISSIONS, TG_DOWNLOAD_WORKERS) are now
# hardcoded as defaults in bot/config.py.
#
# When creating a new worker service in Railway you only need to set ONE
# environment variable manually:
#
#   WORKER_ID=<N>   ← unique per service: 0 = bot, 1-10 = download workers
#
# Start command for dedicated download workers (WORKER_ID >= 1):
#   python -m bot.worker_main
#
# The bot service (WORKER_ID=0) uses the default start command in the Dockerfile.
#
# Volume: attach a Railway volume at /data to EACH worker service.
# Each worker writes its Pyrogram session + downloaded files to its own volume.
# Scans are always local (a worker only scans files it downloaded).
